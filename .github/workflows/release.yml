name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # 用于 PyPI Trusted Publisher（无需手动配置 token）
      contents: write   # 用于创建 GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: 校验 tag 与 pyproject.toml 版本一致
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ tag $TAG_VERSION 与 pyproject.toml $PKG_VERSION 不一致"
            exit 1
          fi
          echo "✅ 版本一致: $PKG_VERSION"

      - name: 构建
        run: uv build

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
